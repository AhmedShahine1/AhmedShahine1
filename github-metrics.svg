    <rect width="435" height="10" rx="6" fill="#1e2d45"/>
    <rect x="30" y="0" width="120" height="10" fill="#f1e05a" rx="6 0 0 6"/><rect x="150" y="0" width="120" height="10" fill="#e34c26" rx="0"/><rect x="270" y="0" width="120" height="10" fill="#563d7c" rx="0"/><rect x="390" y="0" width="75" height="10" fill="#178600" rx="0 6 6 0"/>
  </g>

  <!-- Language labels -->
  
      <circle cx="30" cy="357" r="5" fill="#f1e05a"/>
      <text x="42" y="362" font-size="12" fill="#94a3b8">JavaScript 28%</text>
