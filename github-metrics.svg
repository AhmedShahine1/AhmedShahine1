      <text x="30" y="266" font-size="15" font-weight="600" fill="#e2e8f0">0</text>
      <text x="268" y="90"      font-size="13" fill="#64748b">🐛 Issues</text>
      <text x="268" y="110" font-size="15" font-weight="600" fill="#e2e8f0">0</text>
      <text x="268" y="142"      font-size="13" fill="#64748b">📦 Repositories</text>
      <text x="268" y="162" font-size="15" font-weight="600" fill="#e2e8f0">48</text>
