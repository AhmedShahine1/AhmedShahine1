name: Generate Stats SVG

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Stats SVG
        env:
          USERNAME: AhmedShahine1
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import urllib.request, json, os

          username = os.environ['USERNAME']
          token = os.environ['GH_TOKEN']

          def fetch(url):
              req = urllib.request.Request(url, headers={
                  'Authorization': f'token {token}',
                  'User-Agent': 'Mozilla/5.0'
              })
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          # Fetch user data
          user = fetch(f'https://api.github.com/users/{username}')
          repos = fetch(f'https://api.github.com/users/{username}/repos?per_page=100&type=owner')

          stars = sum(r['stargazers_count'] for r in repos)
          forks = sum(r['forks_count'] for r in repos)
          public_repos = user['public_repos']
          followers = user['followers']

          # Fetch commit count via search
          commits_data = fetch(f'https://api.github.com/search/commits?q=author:{username}&per_page=1')
          commits = commits_data.get('total_count', 0)

          svg = f"""<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195">
            <style>
              .title {{ font: 600 18px 'Segoe UI', sans-serif; fill: #e2e8f0; }}
              .label {{ font: 400 14px 'Segoe UI', sans-serif; fill: #94a3b8; }}
              .value {{ font: 600 14px 'Segoe UI', sans-serif; fill: #e2e8f0; }}
              .icon  {{ fill: #3b82f6; }}
            </style>
            <rect width="495" height="195" rx="10" fill="#111827" stroke="#1e2d45" stroke-width="1"/>
            <text x="25" y="35" class="title">Ahmed Shahine's GitHub Stats</text>
            <!-- Row 1 -->
            <text x="25"  y="80"  class="label">⭐ Stars Earned</text>
            <text x="250" y="80"  class="value">{stars}</text>
            <text x="290" y="80"  class="label">📦 Public Repos</text>
            <text x="450" y="80"  class="value">{public_repos}</text>
            <!-- Row 2 -->
            <text x="25"  y="115" class="label">🔀 Total Forks</text>
            <text x="250" y="115" class="value">{forks}</text>
            <text x="290" y="115" class="label">👥 Followers</text>
            <text x="450" y="115" class="value">{followers}</text>
            <!-- Row 3 -->
            <text x="25"  y="150" class="label">💻 Total Commits</text>
            <text x="250" y="150" class="value">{commits:,}</text>
            <!-- Footer -->
            <text x="25" y="182" font-size="11" fill="#475569">Auto-updated daily · github.com/{username}</text>
          </svg>"""

          with open('github-metrics.svg', 'w') as f:
              f.write(svg)
          print(f"Done: stars={stars}, repos={public_repos}, commits={commits}")
          EOF

      - name: Commit SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-metrics.svg
          git diff --cached --quiet || git commit -m "Update GitHub stats SVG"
          git push
