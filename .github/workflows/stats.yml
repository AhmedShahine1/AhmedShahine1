name: Generate Stats SVG

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Stats SVG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import urllib.request, json, os

          token = os.environ['GH_TOKEN']
          username = "AhmedShahine1"

          def graphql(query, variables={}):
              data = json.dumps({"query": query, "variables": variables}).encode()
              req = urllib.request.Request(
                  "https://api.github.com/graphql",
                  data=data,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                      "User-Agent": "stats-action"
                  }
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          result = graphql("""
          query($login: String!) {
            user(login: $login) {
              followers { totalCount }
              repositories(ownerAffiliations: OWNER, isFork: false, first: 100) {
                totalCount
                nodes { stargazerCount forkCount primaryLanguage { name } }
              }
              contributionsCollection {
                totalCommitContributions
                totalPullRequestContributions
                totalPullRequestReviewContributions
                totalIssueContributions
                contributionCalendar { totalContributions }
              }
            }
          }
          """, {"login": username})

          u  = result["data"]["user"]
          cc = u["contributionsCollection"]
          repos = u["repositories"]["nodes"]

          # ── Stats from what we can see ──────────────────────
          stars    = sum(r["stargazerCount"] for r in repos)
          forks    = sum(r["forkCount"]       for r in repos)
          repos_n  = u["repositories"]["totalCount"]
          followers = u["followers"]["totalCount"]
          total_contribs = cc["contributionCalendar"]["totalContributions"]

          commits  = cc["totalCommitContributions"]
          prs      = cc["totalPullRequestContributions"]
          reviews  = cc["totalPullRequestReviewContributions"]
          issues   = cc["totalIssueContributions"]

          # ── Percentages (same as GitHub's activity overview) ─
          activity_total = commits + prs + reviews + issues or 1
          pct_commits = commits  / activity_total * 100
          pct_prs     = prs      / activity_total * 100
          pct_reviews = reviews  / activity_total * 100
          pct_issues  = issues   / activity_total * 100

          # ── Language breakdown ───────────────────────────────
          lang_count = {}
          for r in repos:
              if r["primaryLanguage"]:
                  l = r["primaryLanguage"]["name"]
                  lang_count[l] = lang_count.get(l, 0) + 1
          top_langs = sorted(lang_count.items(), key=lambda x: -x[1])[:4]
          lang_total = sum(c for _, c in top_langs) or 1

          COLORS = {
              "C#": "#178600", "TypeScript": "#3178c6", "JavaScript": "#f1e05a",
              "Python": "#3572A5", "HTML": "#e34c26", "CSS": "#563d7c",
              "Java": "#b07219", "Go": "#00ADD8",
          }
          def lc(n): return COLORS.get(n, "#8b949e")

          # ── Circular progress arc ────────────────────────────
          def arc(cx, cy, r, pct, color, stroke_w=8):
              if pct <= 0: return ""
              pct = min(pct, 99.9)
              import math
              angle = pct / 100 * 2 * math.pi - math.pi / 2
              end_x = cx + r * math.cos(angle)
              end_y = cy + r * math.sin(angle)
              large = 1 if pct > 50 else 0
              start_x = cx
              start_y = cy - r
              return (f'<circle cx="{cx}" cy="{cy}" r="{r}" fill="none" '
                      f'stroke="#1e2d45" stroke-width="{stroke_w}"/>'
                      f'<path d="M {start_x} {start_y} A {r} {r} 0 {large} 1 {end_x:.2f} {end_y:.2f}" '
                      f'fill="none" stroke="{color}" stroke-width="{stroke_w}" '
                      f'stroke-linecap="round"/>')

          # ── Activity circles ─────────────────────────────────
          circles = [
              (110, 185, pct_commits,  "#3b82f6", "Commits",   f"{pct_commits:.0f}%"),
              (248, 185, pct_prs,      "#10b981", "PRs",       f"{pct_prs:.0f}%"),
              (386, 185, pct_reviews,  "#f59e0b", "Reviews",   f"{pct_reviews:.0f}%"),
          ]

          circles_svg = ""
          for cx, cy, pct, color, label, pct_txt in circles:
              circles_svg += arc(cx, cy, 46, pct, color, 9)
              circles_svg += f"""
                <text x="{cx}" y="{cy - 6}" text-anchor="middle"
                      font-size="16" font-weight="700" fill="#e2e8f0"
                      font-family="'Segoe UI',sans-serif">{pct_txt}</text>
                <text x="{cx}" y="{cy + 12}" text-anchor="middle"
                      font-size="11" fill="#64748b"
                      font-family="'Segoe UI',sans-serif">{label}</text>
                <text x="{cx}" y="{cy + 64}" text-anchor="middle"
                      font-size="12" fill="#94a3b8"
                      font-family="'Segoe UI',sans-serif">{label}</text>"""

          # ── Language bar ─────────────────────────────────────
          lang_bar = ""
          lang_labels = ""
          bx = 30
          bw = 435
          for idx, (lang, count) in enumerate(top_langs):
              p   = count / lang_total
              w   = int(p * bw)
              col = lc(lang)
              r_attr = ("6 0 0 6" if idx == 0 else
                        ("0 6 6 0" if idx == len(top_langs)-1 else "0"))
              lang_bar += (f'<rect x="{bx}" y="0" width="{w}" height="10" '
                           f'fill="{col}" rx="{r_attr}"/>')
              lx = 30 + idx * 115
              lang_labels += (f'<circle cx="{lx}" cy="357" r="5" fill="{col}"/>'
                              f'<text x="{lx+12}" y="362" font-size="12" '
                              f'fill="#94a3b8" font-family="\'Segoe UI\',sans-serif">'
                              f'{lang} {p*100:.0f}%</text>')
              bx += w

          # ── Top stats row ─────────────────────────────────────
          top_stats = [
              ("⭐", f"{stars:,}",          "Stars"),
              ("🔥", f"{total_contribs:,}", "Contributions"),
              ("📦", f"{repos_n}",          "Repos"),
              ("👥", f"{followers}",        "Followers"),
          ]
          top_svg = ""
          for i, (icon, val, lbl) in enumerate(top_stats):
              tx = 30 + i * 115
              top_svg += f"""
                <text x="{tx+20}" y="80" text-anchor="middle"
                      font-size="14" font-weight="700" fill="#e2e8f0"
                      font-family="'Segoe UI',sans-serif">{icon} {val}</text>
                <text x="{tx+20}" y="96" text-anchor="middle"
                      font-size="11" fill="#64748b"
                      font-family="'Segoe UI',sans-serif">{lbl}</text>"""

          # ── Full SVG ──────────────────────────────────────────
          svg = f"""<svg xmlns="http://www.w3.org/2000/svg"
                       width="495" height="390" viewBox="0 0 495 390">
            <rect width="495" height="390" rx="12"
                  fill="#0f172a" stroke="#1e2d45" stroke-width="1.5"/>

            <!-- Title -->
            <text x="30" y="36" font-size="16" font-weight="700" fill="#e2e8f0"
                  font-family="'Segoe UI',sans-serif">Ahmed Shahine's GitHub Stats</text>
            <text x="30" y="54" font-size="11" fill="#475569"
                  font-family="'Segoe UI',sans-serif">@{username} · auto-updated daily</text>

            <line x1="30" y1="64" x2="465" y2="64" stroke="#1e2d45" stroke-width="1"/>

            <!-- Top stats row -->
            {top_svg}

            <line x1="30" y1="108" x2="465" y2="108" stroke="#1e2d45" stroke-width="1"/>

            <!-- Section label -->
            <text x="30" y="130" font-size="12" fill="#64748b"
                  font-family="'Segoe UI',sans-serif">Activity breakdown (this year)</text>

            <!-- Circular progress -->
            {circles_svg}

            <line x1="30" y1="252" x2="465" y2="252" stroke="#1e2d45" stroke-width="1"/>

            <!-- Languages label -->
            <text x="30" y="276" font-size="12" fill="#64748b"
                  font-family="'Segoe UI',sans-serif">Most Used Languages</text>

            <!-- Language bar -->
            <g transform="translate(30,284)">
              <rect width="435" height="10" rx="6" fill="#1e2d45"/>
              {lang_bar}
            </g>

            <!-- Language labels -->
            {lang_labels}

          </svg>"""

          with open("github-metrics.svg", "w", encoding="utf-8") as f:
              f.write(svg)
          print(f"Done · commits={commits} prs={prs} reviews={reviews} stars={stars}")
          EOF

      - name: Commit SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-metrics.svg
          git diff --cached --quiet || git commit -m "chore: update GitHub stats [skip ci]"
          git push
